<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OptionCharts — Home</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* Critical fallback so content is never invisible */
    body { margin: 0; background: #1a1d24; color: #e8eaed; font-family: system-ui, sans-serif; }
    .header { background: #22262e; padding: 1rem 1.5rem; border-bottom: 1px solid #3c4043; }
    .major-table th, .major-table td { padding: 0.75rem 1rem; border-bottom: 1px solid #3c4043; }
    .watchlist-section { background: #22262e; padding: 1.25rem; border-radius: 8px; margin-top: 1.5rem; }
    .btn-deduct { width: 32px; height: 32px; border-radius: 50%; background: #ea4335; border: none; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="logo">OptionCharts</h1>
    <div class="header-actions">
      <div class="portfolio-switch" role="group" aria-label="Portfolio">
        <button type="button" class="portfolio-btn is-selected" data-portfolio="1" aria-pressed="true">RH</button>
        <button type="button" class="portfolio-btn" data-portfolio="2" aria-pressed="false">AL</button>
        <button type="button" class="portfolio-btn" data-portfolio="3" aria-pressed="false">BT</button>
        <button type="button" class="portfolio-btn" data-portfolio="4" aria-pressed="false">DF</button>
        <button type="button" class="portfolio-btn" data-portfolio="5" aria-pressed="false">EL</button>
        <button type="button" class="portfolio-btn" data-portfolio="6" aria-pressed="false">66</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="view-home">
    <section class="table-section">
      <div class="update-row">
        <button type="button" class="btn-update" id="btnUpdate">Update</button>
        <span class="last-update" id="lastUpdate">Last updated: —</span>
      </div>
      <h2>Major Table <span class="sub">(Timed scrape snapshot)</span></h2>
      <div class="table-wrap">
        <table class="major-table" id="majorTable">
          <thead>
            <tr>
              <th>Symbol</th>
              <th>IVR</th>
              <th>TOI</th>
              <th class="num">%</th>
              <th>PCRO</th>
              <th>TOA</th>
              <th>TV</th>
              <th class="num">%</th>
              <th>PCRV</th>
              <th>TVA</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td class="symbol">—</td>
              <td>—</td>
              <td>—</td>
              <td class="num">—</td>
              <td>—</td>
              <td>—</td>
              <td>—</td>
              <td class="num">—</td>
              <td>—</td>
              <td>—</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="watchlist-section">
      <div class="watchlist-head">
        <h2>Watchlist <span class="count" id="watchlistCount">1/30</span></h2>
        <p class="section-label">STOCKS</p>
      </div>
      <div class="watchlist-actions">
        <input type="text" id="addSymbol" placeholder="Add symbol (e.g. AVAV)" maxlength="12" />
        <button type="button" class="btn-add" id="btnAdd">Add</button>
      </div>
      <ul class="watchlist" id="watchlist">
        <li data-symbol="AVAV">
          <span class="symbol-icon" aria-hidden="true">A</span>
          <div class="symbol-info">
            <div class="symbol-primary">AVAV</div>
            <div class="symbol-secondary">AVAV.US</div>
          </div>
          <button type="button" class="btn-deduct" aria-label="Remove AVAV from watchlist"></button>
        </li>
      </ul>
    </section>
    </div>

    <div id="view-symbol" class="hidden">
      <div class="symbol-page-header">
        <a href="#" class="link-back" id="linkBack">← Back</a>
        <h1 class="symbol-page-title" id="symbolPageTitle">—</h1>
      </div>
      <section class="table-section symbol-records-section">
        <h2>Scrape records <span class="sub">(up to 2 per day: Timed + latest Manual)</span></h2>
        <div class="table-wrap">
          <table class="major-table symbol-records-table" id="symbolRecordsTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>IVR</th>
                <th>TOI</th>
                <th class="num">%</th>
                <th>PCRO</th>
                <th>TOA</th>
                <th>TV</th>
                <th class="num">%</th>
                <th>PCRV</th>
                <th>TVA</th>
              </tr>
            </thead>
            <tbody id="symbolRecordsBody">
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
